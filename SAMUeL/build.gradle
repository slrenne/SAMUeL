plugins {
    id 'java'
}

group = 'org.samuel'
version = '0.1.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
    maven { url = uri('https://maven.scijava.org/content/groups/public') }
}

dependencies {
    implementation 'io.github.qupath:qupath-gui-fx:0.5.1'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'
    implementation 'org.slf4j:slf4j-api:2.0.13'
    implementation 'org.apache.commons:commons-lang3:3.15.0'
    implementation 'org.controlsfx:controlsfx:11.2.1'
    implementation 'org.openjfx:javafx-base:17.0.12:win'
    implementation 'org.openjfx:javafx-graphics:17.0.12:win'
    implementation 'org.openjfx:javafx-controls:17.0.12:win'

    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.0'
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}
